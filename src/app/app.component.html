<nav class="sticky top-0 z-50 bg-white/85 backdrop-blur-md border-b border-gray-100 h-16">
  <div class="max-w-screen-2xl mx-auto h-full px-6 flex justify-between items-center gap-4">

    <!-- Brand -->
    <a href="#welcome" class="flex items-center gap-2.5 shrink-0">
      <img src="assets/favicon/android-chrome-512x512.png" alt="Valentin Virot logo" class="w-7 h-7" />
      <span class="text-sm font-semibold text-gray-900 tracking-tight">Valentin Virot</span>
    </a>

    <!-- Desktop nav links -->
    <div class="hidden md:flex items-center gap-0.5">
      <a href="#about"      class="text-sm font-medium text-gray-500 px-3 py-1.5 rounded-lg hover:text-gray-900 hover:bg-gray-100 transition-all duration-150">About</a>
      <a href="#experience" class="text-sm font-medium text-gray-500 px-3 py-1.5 rounded-lg hover:text-gray-900 hover:bg-gray-100 transition-all duration-150">Experience</a>
      <a href="#portfolio"  class="text-sm font-medium text-gray-500 px-3 py-1.5 rounded-lg hover:text-gray-900 hover:bg-gray-100 transition-all duration-150">Projects</a>
      <a href="#skills"     class="text-sm font-medium text-gray-500 px-3 py-1.5 rounded-lg hover:text-gray-900 hover:bg-gray-100 transition-all duration-150">Certifications</a>
    </div>

    <!-- CV download -->
    <button
      type="button"
      class="flex items-center gap-2 bg-secondary text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-secondaryDarker transition-colors duration-200 shrink-0"
      (click)="openCvOverlay()"
      aria-label="Open CV download options"
    >
      <fa-icon [icon]="downloadIcon"></fa-icon>
      <span>CV</span>
    </button>

  </div>
</nav>

@if (isCvOverlayOpen) {
  <div
    class="fixed inset-0 z-60 bg-black/40 backdrop-blur-[1px] px-6"
    (click)="closeCvOverlay()"
    aria-hidden="true"
  ></div>

  <div class="fixed inset-0 z-70 flex items-center justify-center px-6" role="dialog" aria-modal="true" aria-label="Choose CV language">
    <div class="w-full max-w-sm rounded-2xl border border-gray-200 bg-white p-6 shadow-2xl" (click)="$event.stopPropagation()">
      <h2 class="text-lg font-bold text-gray-900">Download my CV</h2>
      <p class="mt-1 text-sm text-gray-500">Choose your preferred language.</p>

      <div class="mt-5 flex flex-col gap-3">
        <a
          class="flex items-center justify-center gap-2 bg-secondary text-white px-4 py-3 rounded-xl text-sm font-semibold hover:bg-secondaryDarker transition-colors duration-200"
          href="assets/files/CV_Valentin_Virot_2026_FR.pdf"
          download="CV_Valentin_Virot_2026_FR.pdf"
          (click)="closeCvOverlay()"
          aria-label="Download Valentin Virot's French resume PDF"
        >
          <fa-icon [icon]="downloadIcon"></fa-icon>
          <span>CV FR</span>
        </a>

        <a
          class="flex items-center justify-center gap-2 bg-white text-secondary border border-secondary/25 px-4 py-3 rounded-xl text-sm font-semibold hover:bg-secondary/5 transition-colors duration-200"
          href="assets/files/CV_Valentin_Virot_2026_EN.pdf"
          download="CV_Valentin_Virot_2026_EN.pdf"
          (click)="closeCvOverlay()"
          aria-label="Download Valentin Virot's English resume PDF"
        >
          <fa-icon [icon]="downloadIcon"></fa-icon>
          <span>CV EN</span>
        </a>
      </div>

      <button
        type="button"
        class="mt-4 w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors duration-200"
        (click)="closeCvOverlay()"
      >
        Close
      </button>
    </div>
  </div>
}

<div class="max-w-screen-2xl mx-auto relative overflow-hidden">
  <div class="absolute top-0 -left-32 w-lg h-128 bg-now rounded-full opacity-25 -z-10 blur-3xl pointer-events-none"></div>
  <div class="absolute top-160 -right-32 w-lg h-128 bg-azure rounded-full opacity-20 -z-10 blur-3xl pointer-events-none"></div>
  <router-outlet></router-outlet>
</div>
